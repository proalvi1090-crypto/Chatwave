services:
  mongo:
    image: mongo:7
    container_name: chatwave-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: chatwave-redis
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
    container_name: chatwave-server
    env_file:
      - ./.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/chatwave
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    container_name: chatwave-client
    environment:
      VITE_DEV_PROXY_TARGET: http://server:5000
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

  bot:
    build:
      context: ./bot
    container_name: chatwave-bot
    env_file:
      - ./.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/chatwave
      REDIS_URL: redis://redis:6379
      BOT_MODE: polling
      BOT_PORT: 7001
    depends_on:
      - mongo
      - redis
    ports:
      - "7001:7001"
    volumes:
      - ./bot:/app
      - /app/node_modules

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: chatwave-tunnel
    command: tunnel --no-autoupdate --url http://client:5173
    depends_on:
      - client

volumes:
  mongo_data:
